<app-section
  sectionId="contact"
  label="Contact"
  title="Let's Talk"
  subtitle="Have a question or project in mind? We'd love to hear from you."
  variant="hero"
  maxWidth="max-w-2xl"
>
  <!-- Add pt-16 to push below the fixed navbar -->
  <div class="pt-16">
    <form (ngSubmit)="onSubmit()" class="space-y-5">
      <input
        [(ngModel)]="formData.name" name="name" placeholder="Your name" required type="text"
        class="w-full bg-white/10 border border-white/20 rounded-xl px-5 py-4 text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
      <input
        [(ngModel)]="formData.email" name="email" placeholder="Email" required type="email"
        class="w-full bg-white/10 border border-white/20 rounded-xl px-5 py-4 text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
      <input
        [(ngModel)]="formData.institution" name="institution" placeholder="Institution (optional)" type="text"
        class="w-full bg-white/10 border border-white/20 rounded-xl px-5 py-4 text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
      <textarea
        [(ngModel)]="formData.message" name="message" placeholder="How can we help?" required rows="5"
        class="w-full bg-white/10 border border-white/20 rounded-xl px-5 py-4 text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all resize-none">
      </textarea>
      <button type="submit"
              class="w-full bg-linear-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white py-4 rounded-xl font-semibold transition-all shadow-lg shadow-indigo-500/30 flex items-center justify-center gap-2 cursor-pointer">
        <span>Send Message</span>
        <i class="fas fa-paper-plane"></i>
      </button>
    </form>
  </div>
</app-section>

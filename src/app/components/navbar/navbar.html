<nav class="fixed top-0 w-full z-50 bg-slate-900/95 backdrop-blur-sm border-b border-slate-800">
  <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
    <a class="text-xl font-bold text-white" routerLink="/">Better HPC</a>

    <!-- Desktop Nav -->
    <div class="hidden md:flex items-center gap-8">
      @for (link of navLinks; track link.route) {
        <a
          [routerLink]="link.route"
          [routerLinkActiveOptions]="{ exact: link.route === '/' }"
          routerLinkActive="text-white"
          class="text-slate-300 hover:text-white transition-colors text-sm"
        >
          {{ link.label }}
        </a>
      }
      <a
        routerLink="/contact"
        routerLinkActive="ring-2 ring-indigo-400"
        class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2 rounded-lg text-sm font-medium transition-colors"
      >
        Contact Us
      </a>
    </div>

    <!-- Mobile Menu Button -->
    <button
      #menuToggle
      (click)="toggleMenu()"
      aria-label="Toggle menu"
      class="md:hidden text-white cursor-pointer"
    >
      <i [ngClass]="isMenuOpen ? 'fa-times' : 'fa-bars'" class="fas text-xl"></i>
    </button>
  </div>

  <!-- Mobile Menu -->
  @if (isMenuOpen) {
    <div #mobileMenu class="md:hidden bg-slate-900 border-t border-white/5 px-6 py-4">
      <div class="flex flex-col gap-4 text-sm font-medium">
        @for (link of navLinks; track link.route) {
          <a
            (click)="closeMenu()"
            [routerLink]="link.route"
            class="text-slate-400 hover:text-white transition-colors"
          >
            {{ link.label }}
          </a>
        }
        <a
          (click)="closeMenu()"
          routerLink="/contact"
          class="bg-indigo-600 text-white px-5 py-2 rounded-lg text-center"
        >
          Contact Us
        </a>
      </div>
    </div>
  }
</nav>
